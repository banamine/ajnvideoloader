<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AJN · Carousel News + IPTV Archive (Fully Fixed)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/dashjs@latest/dist/dash.all.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-deep: #0a0c12;
      --bg-surface: #11141c;
      --card-bg: #1a1f2a;
      --text-primary: #f0f3fa;
      --text-secondary: #cbd5e6;
      --accent: #3b82f6;
      --border: #2d3748;
      --hr1: #3b82f6;
      --hr2: #f97316;
      --hr3: #8b5cf6;
      --special: #10b981;
    }
    body.light {
      --bg-deep: #f1f5f9;
      --bg-surface: #ffffff;
      --card-bg: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --border: #cbd5e1;
      --hr1: #2563eb;
      --hr2: #ea580c;
      --hr3: #7c3aed;
      --special: #059669;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      padding: 20px;
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }
    .skip-link { position: absolute; top: -40px; left: 0; background: var(--accent); color: white; padding: 8px 16px; z-index: 9999; border-radius: 0 0 8px 0; text-decoration: none; }
    .skip-link:focus { top: 10px; }
    main { max-width: 1400px; margin: 0 auto; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
    .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), #facc15); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .theme-btn { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 40px; padding: 8px 20px; color: var(--text-primary); font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 6px; }
    .theme-btn:hover { background: var(--accent); color: white; }
    .main-grid { display: grid; grid-template-columns: 1fr 380px; gap: 28px; }
    @media (max-width: 880px) { .main-grid { grid-template-columns: 1fr; } }
    .carousel-section {
      background: var(--bg-surface);
      border-radius: 28px;
      padding: 20px 0 24px 0;
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .carousel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 28px 20px 28px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .carousel-header h2 { font-size: 1.2rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), #facc15); -webkit-background-clip: text; background-clip: text; color: transparent; display: flex; align-items: center; gap: 8px; }
    .carousel-controls { display: flex; gap: 10px; }
    .carousel-controls button { background: var(--bg-deep); border: 1px solid var(--border); border-radius: 40px; padding: 6px 14px; cursor: pointer; color: var(--text-primary); font-size: 0.75rem; transition: 0.2s; display: inline-flex; align-items: center; gap: 5px; }
    .carousel-controls button:hover { background: var(--accent); color: white; }
    .modal-carousel-wrapper {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      gap: 28px;
      padding: 8px 28px 8px 28px;
      width: 100%;
    }
    .modal-carousel-wrapper::-webkit-scrollbar { height: 5px; }
    .news-modal-card {
      scroll-snap-align: center;
      min-width: 65%;
      max-width: 540px;
      flex: 0 0 auto;
      background: var(--card-bg);
      border-radius: 28px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s;
    }
    .news-modal-card:hover { transform: translateY(-5px); box-shadow: 0 20px 30px -12px rgba(0,0,0,0.4); }
    .modal-card-content { padding: 24px; }
    .modal-source { font-size: 0.7rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .modal-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 12px; line-height: 1.4; }
    .modal-desc { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; margin-bottom: 16px; }
    .modal-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 14px; margin-top: 6px; font-size: 0.7rem; }
    .right-panel {
      background: var(--bg-surface);
      border-radius: 28px;
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .player-area { background: #000; aspect-ratio: 16 / 9; width: 100%; }
    #videoPlayer { width: 100%; height: 100%; object-fit: contain; }
    .control-bar { display: flex; justify-content: center; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .ctrl-btn { background: var(--bg-deep); border: 1px solid var(--border); border-radius: 40px; padding: 6px 14px; font-size: 0.75rem; cursor: pointer; color: var(--text-primary); transition: 0.2s; display: inline-flex; align-items: center; gap: 5px; }
    .ctrl-btn:hover { background: var(--accent); color: white; }
    .tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 12px; gap: 2px; background: var(--bg-surface); }
    .tab { padding: 10px 14px; font-size: 0.8rem; background: transparent; border: none; color: var(--text-secondary); font-weight: 600; cursor: pointer; transition: 0.2s; }
    .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
    .tab-pane { display: none; padding: 16px; max-height: 340px; overflow-y: auto; scrollbar-width: thin; }
    .tab-pane.active { display: block; }
    .compact-video-list { max-height: 260px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-top: 8px; padding-right: 4px; }
    .tile-block {
      background: linear-gradient(90deg, rgba(59,130,246,0.08) 0%, var(--bg-deep) 80%);
      border-left: 4px solid var(--accent);
      padding: 10px 12px;
      border-radius: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 0.75rem;
      transition: 0.15s;
    }
    .tile-block:hover { background: rgba(59,130,246,0.2); transform: translateX(3px); }
    .tile-block.hr1 { border-left-color: var(--hr1); }
    .tile-block.hr2 { border-left-color: var(--hr2); }
    .tile-block.hr3 { border-left-color: var(--hr3); }
    .tile-block.special { border-left-color: var(--special); }
    .tile-block span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 170px; }
    .play-tile-btn { background: var(--accent); border: none; border-radius: 30px; padding: 4px 12px; font-size: 0.7rem; font-weight: 600; cursor: pointer; color: white; transition: 0.15s; }
    .link-item { background: var(--bg-deep); padding: 8px 12px; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); font-size: 0.75rem; margin-bottom: 6px; cursor: pointer; }
    input, button { background: var(--bg-deep); border: 1px solid var(--border); border-radius: 60px; padding: 8px 14px; color: var(--text-primary); width: 100%; margin-top: 6px; font-size: 0.8rem; }
    .url-label { font-size: 0.7rem; font-weight: 500; margin-top: 8px; display: block; }
    .proxy-status { font-size: 0.65rem; text-align: center; margin-top: 10px; color: var(--text-secondary); }
    .drop-zone { border: 1.5px dashed var(--accent); border-radius: 18px; padding: 12px; text-align: center; margin-bottom: 12px; cursor: pointer; font-size: 0.7rem; background: var(--bg-deep); }
    .error-placeholder { text-align: center; padding: 30px; color: var(--text-secondary); }
  </style>
</head>
<body>
<a href="#main-content" class="skip-link">Skip to main content</a>
<main id="main-content">
  <div class="top-bar">
    <div class="logo"><i class="fas fa-newspaper"></i> AJN · Carousel News + IPTV</div>
    <button class="theme-btn" id="themeToggle"><i class="fas fa-moon"></i> Dark/Light</button>
  </div>
  <div class="main-grid">
    <div>
      <div class="carousel-section">
        <div class="carousel-header">
          <h2><i class="fas fa-bullhorn"></i> Barn Door News · 5s Reading Pace</h2>
          <div class="carousel-controls">
            <button id="prevSlideBtn"><i class="fas fa-arrow-left"></i> Prev</button>
            <button id="nextSlideBtn">Next <i class="fas fa-arrow-right"></i></button>
            <button id="autoScrollToggle"><i class="fas fa-play"></i> Auto</button>
          </div>
        </div>
        <div class="modal-carousel-wrapper" id="carouselContainer"><div class="error-placeholder">Loading news feeds...</div></div>
      </div>
    </div>
    <div class="right-panel">
      <div class="player-area">
        <video id="videoPlayer" controls playsinline preload="metadata"><track kind="captions" label="Captions" srclang="en"></video>
      </div>
      <div class="control-bar">
        <button class="ctrl-btn" id="playPauseBtn"><i class="fas fa-play"></i> Play</button>
        <button class="ctrl-btn" id="muteBtn"><i class="fas fa-volume-up"></i> Mute</button>
        <button class="ctrl-btn" id="stopBtn"><i class="fas fa-stop"></i> Stop</button>
      </div>
      <div class="tabs" role="tablist">
        <button class="tab active" data-tab="playlist" role="tab">📡 Playlist</button>
        <button class="tab" data-tab="archive" role="tab">🗄️ AJN Archive</button>
        <button class="tab" data-tab="favorites" role="tab">⭐ Favorites</button>
      </div>
      <div id="playlist" class="tab-pane active">
        <div class="drop-zone" id="dropZone"><i class="fas fa-cloud-upload-alt"></i> Drop .m3u or click</div>
        <label class="url-label">M3U / Video URL:</label>
        <input type="text" id="urlInput" placeholder="https://example.com/stream.m3u8 or playlist.m3u">
        <button id="loadUrlBtn">Load from URL</button>
        <button id="savePlaylistBtn">💾 Save Playlist</button>
        <div class="link-list" id="playlistContainer" style="max-height:160px; overflow-y:auto;"></div>
      </div>
      <div id="archive" class="tab-pane">
        <div style="display: flex; gap: 8px; margin-bottom: 10px;">
          <button id="refreshArchiveBtn" style="background: var(--accent); margin:0; flex:1;">🔄 Refresh Archive</button>
        </div>
        <div id="archiveTileContainer" class="compact-video-list"><div class="error-placeholder" style="padding:12px;">Click refresh to load videos</div></div>
        <div id="archiveStatus" class="proxy-status">📺 AJN episodes with color coding (Hr1/Hr2/Hr3)</div>
      </div>
      <div id="favorites" class="tab-pane">
        <div id="favoritesList" class="compact-video-list"></div>
        <button id="exportFavBtn">📁 Export M3U</button>
      </div>
    </div>
  </div>
</main>

<script>
  // ========== HELPER: PROXY CHAIN ==========
  const PROXY_LIST = [
    (url) => fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`),
    (url) => fetch(`https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(url)}`),
    (url) => fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`)
  ];
  async function fetchWithProxyChain(url, timeoutMs = 10000) {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
    for (let i = 0; i < PROXY_LIST.length; i++) {
      try {
        const res = await PROXY_LIST[i](url, { signal: controller.signal });
        if (res.ok) {
          const text = await res.text();
          clearTimeout(timeoutId);
          return text;
        }
      } catch (e) { console.warn(`Proxy ${i+1} failed:`, e); }
    }
    clearTimeout(timeoutId);
    throw new Error('All proxies failed');
  }

  // ========== 1. CAROUSEL NEWS (WORKING FEEDS) ==========
  let carouselItems = [];
  let autoInterval = null;
  let autoActive = true;
  const carouselContainer = document.getElementById('carouselContainer');
  const prevBtn = document.getElementById('prevSlideBtn');
  const nextBtn = document.getElementById('nextSlideBtn');
  const autoToggle = document.getElementById('autoScrollToggle');

  const RSS_FEEDS = [
    'https://www.labnol.org/rss.xml',
    'https://techcrunch.com/feed/',
    'https://www.sciencedaily.com/rss/top.xml',
    'https://yourstory.com/feed',
    'https://fossbytes.com/feed/',
    'https://techpp.com/feed/',
    'https://www.wired.com/feed/rss',
    'https://mashable.com/feeds/rss/all',
    'https://www.cnet.com/rss/news/'
  ];

  async function fetchSingleFeed(url) {
    try {
      const xmlText = await fetchWithProxyChain(url, 8000);
      const parser = new DOMParser();
      const xml = parser.parseFromString(xmlText, "application/xml");
      if (xml.querySelector('parsererror')) return [];
      const items = Array.from(xml.querySelectorAll("item")).slice(0, 3);
      return items.map(item => ({
        title: item.querySelector("title")?.textContent?.trim() || "Untitled",
        link: item.querySelector("link")?.textContent?.trim() || "#",
        pubDate: item.querySelector("pubDate")?.textContent || new Date().toUTCString(),
        description: item.querySelector("description")?.textContent?.replace(/<[^>]*>/g, '').slice(0, 200) || ""
      }));
    } catch(e) { console.warn(`Feed error ${url}:`, e); return []; }
  }

  async function loadCarouselNews() {
    carouselContainer.innerHTML = '<div class="error-placeholder">Fetching news...</div>';
    try {
      const results = await Promise.all(RSS_FEEDS.map(fetchSingleFeed));
      let articles = results.flat();
      if (articles.length === 0) throw new Error('No articles loaded');
      articles.sort((a,b) => new Date(b.pubDate) - new Date(a.pubDate));
      carouselItems = articles.slice(0, 14);
      renderCarousel();
      startAutoScroll();
    } catch(e) {
      console.error(e);
      carouselContainer.innerHTML = '<div class="error-placeholder">⚠️ Unable to load news. Check network or try again.</div>';
    }
  }

  function renderCarousel() {
    if (!carouselItems.length) { carouselContainer.innerHTML = '<div class="error-placeholder">No articles available</div>'; return; }
    carouselContainer.innerHTML = carouselItems.map(article => {
      let host = "source";
      try { host = new URL(article.link).hostname.replace('www.', '').split('.')[0]; } catch(e) {}
      return `<div class="news-modal-card" data-url="${escapeHtml(article.link)}"><div class="modal-card-content"><div class="modal-source">${escapeHtml(host)}</div><div class="modal-title">${escapeHtml(article.title)}</div><div class="modal-desc">${escapeHtml(article.description)}${article.description ? '...' : ''}</div><div class="modal-footer"><span><i class="far fa-clock"></i> ${new Date(article.pubDate).toLocaleDateString()}</span><span style="color:var(--accent);">Read →</span></div></div></div>`;
    }).join('');
    document.querySelectorAll('.news-modal-card').forEach(card => {
      card.addEventListener('click', () => window.open(card.dataset.url, '_blank', 'noopener,noreferrer'));
    });
  }

  function startAutoScroll() {
    if (autoInterval) clearInterval(autoInterval);
    if (!autoActive) return;
    autoInterval = setInterval(() => {
      if (!carouselContainer) return;
      const maxScroll = carouselContainer.scrollWidth - carouselContainer.clientWidth;
      if (carouselContainer.scrollLeft + 10 >= maxScroll) {
        carouselContainer.scrollTo({ left: 0, behavior: 'smooth' });
      } else {
        const firstCard = carouselContainer.querySelector('.news-modal-card');
        if (firstCard) carouselContainer.scrollBy({ left: firstCard.offsetWidth + 28, behavior: 'smooth' });
        else carouselContainer.scrollBy({ left: 380, behavior: 'smooth' });
      }
    }, 5000);
  }
  function stopAutoScroll() { if (autoInterval) { clearInterval(autoInterval); autoInterval = null; } }
  prevBtn.addEventListener('click', () => { stopAutoScroll(); carouselContainer.scrollBy({ left: -450, behavior: 'smooth' }); if(autoActive) startAutoScroll(); });
  nextBtn.addEventListener('click', () => { stopAutoScroll(); carouselContainer.scrollBy({ left: 450, behavior: 'smooth' }); if(autoActive) startAutoScroll(); });
  autoToggle.addEventListener('click', () => {
    autoActive = !autoActive;
    if (autoActive) { startAutoScroll(); autoToggle.innerHTML = '<i class="fas fa-pause"></i> Auto'; }
    else { stopAutoScroll(); autoToggle.innerHTML = '<i class="fas fa-play"></i> Auto'; }
  });

  // ========== 2. AJN ARCHIVE TILES (COLOR CODED: Hr1/Hr2/Hr3) ==========
  function getTileClass(title) {
    const t = title.toLowerCase();
    if (t.includes('hr1') || t.includes('alex-hr1') || t.includes('warroom-hr1')) return 'hr1';
    if (t.includes('hr2') || t.includes('alex-hr2') || t.includes('warroom-hr2')) return 'hr2';
    if (t.includes('hr3') || t.includes('alex-hr3') || t.includes('warroom-hr3')) return 'hr3';
    if (t.includes('special') || t.includes('sundaylive') || t.includes('tnt')) return 'special';
    return 'hr1';
  }

  async function fetchAJNArchiveTiles() {
    const statusDiv = document.getElementById('archiveStatus');
    const container = document.getElementById('archiveTileContainer');
    statusDiv.innerHTML = '🔄 Fetching AJN archive via proxy chain...';
    container.innerHTML = '<div class="error-placeholder" style="padding:12px;">Loading episodes...</div>';
    try {
      const targetUrl = 'https://rss.alexjones.media/AJNHourlyVideo.html';
      const html = await fetchWithProxyChain(targetUrl, 10000);
      let matches = [];
      const plainRegex = /(https?:\/\/[^\s"'<>]+\.m4v)/gi;
      let m;
      while ((m = plainRegex.exec(html)) !== null) {
        let url = m[1];
        if (!matches.some(x => x.url === url)) {
          let title = url.split('/').pop().replace('.m4v', '').replace(/_/g, ' ');
          matches.push({ url, title: title.substring(0, 55) });
        }
      }
      const linkRegex = /href="([^"]+\.m4v[^"]*)"/gi;
      while ((m = linkRegex.exec(html)) !== null) {
        let url = m[1];
        if (url.startsWith('/')) url = 'https://rss.alexjones.media' + url;
        if (!matches.some(x => x.url === url)) {
          let title = url.split('/').pop().replace('.m4v', '');
          matches.push({ url, title: title.substring(0, 55) });
        }
      }
      if (matches.length === 0) throw new Error('No videos found');
      const shortList = matches.slice(0, 10);
      container.innerHTML = '';
      shortList.forEach(v => {
        const tileClass = getTileClass(v.title);
        const tile = document.createElement('div');
        tile.className = `tile-block ${tileClass}`;
        tile.setAttribute('data-url', v.url);
        tile.innerHTML = `<span><i class="fas fa-video"></i> ${escapeHtml(v.title)}</span><button class="play-tile-btn">▶ Play</button>`;
        tile.addEventListener('click', (e) => { if (!e.target.classList.contains('play-tile-btn')) playWithRecovery(v.url); });
        tile.querySelector('.play-tile-btn')?.addEventListener('click', (e) => { e.stopPropagation(); playWithRecovery(v.url); });
        container.appendChild(tile);
      });
      statusDiv.innerHTML = `✅ ${shortList.length} episodes (color coded: Hr1🔵 Hr2🟠 Hr3🟣). Click to play.`;
    } catch(e) {
      console.warn(e);
      statusDiv.innerHTML = '⚠️ Archive unavailable. Try later.';
      container.innerHTML = '<div class="error-placeholder" style="padding:12px;">Unable to load videos</div>';
    }
  }
  document.getElementById('refreshArchiveBtn')?.addEventListener('click', fetchAJNArchiveTiles);

  // ========== 3. IPTV PLAYER (FIXED) ==========
  let video = document.getElementById('videoPlayer');
  let hlsPlayer = null;
  let dashPlayer = null;
  let currentPlaylist = [];
  let favorites = JSON.parse(localStorage.getItem('ajnFavorites') || '[]');

  function fullCleanup() {
    if (hlsPlayer) { try { hlsPlayer.destroy(); } catch(e) { console.warn(e); } hlsPlayer = null; }
    if (dashPlayer) { try { dashPlayer.destroy(); } catch(e) { console.warn(e); } dashPlayer = null; }
  }

  function playWithRecovery(url) {
    if (!url) return;
    fullCleanup();
    video.pause();
    video.removeAttribute('src');
    video.load();
    if (url.includes('.m3u8') && Hls.isSupported()) {
      hlsPlayer = new Hls({ debug: false, enableWorker: true });
      hlsPlayer.loadSource(url);
      hlsPlayer.attachMedia(video);
      hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(e=>console.warn(e)));
      hlsPlayer.on(Hls.Events.ERROR, (_, data) => {
        if (data.fatal) {
          if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hlsPlayer.startLoad();
          else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hlsPlayer.recoverMediaError();
          else fullCleanup();
        }
      });
    } else if (url.includes('.mpd') && typeof dashjs !== 'undefined' && dashjs.MediaPlayer) {
      dashPlayer = dashjs.MediaPlayer().create();
      dashPlayer.initialize(video, url, true);
      dashPlayer.on('error', () => fullCleanup());
    } else {
      video.src = url;
      video.load();
      video.play().catch(e=>console.warn(e));
    }
  }

  function parseM3U(content) {
    const lines = content.split(/\r?\n/);
    let channels = [];
    let current = null;
    for (let line of lines) {
      line = line.trim();
      if (line.startsWith('#EXTINF')) {
        let nameMatch = line.match(/,([^,]+)$/);
        current = { name: nameMatch ? nameMatch[1] : 'Channel', url: null };
      } else if (line && !line.startsWith('#') && current && line.startsWith('http')) {
        current.url = line;
        channels.push(current);
        current = null;
      }
    }
    if (channels.length) {
      currentPlaylist = channels;
      renderPlaylist();
      if (channels.length) playWithRecovery(channels[0].url);
    } else {
      let urlMatch = content.match(/https?:\/\/[^\s]+/);
      if (urlMatch) {
        currentPlaylist = [{ name: "Stream", url: urlMatch[0] }];
        renderPlaylist();
        playWithRecovery(urlMatch[0]);
      }
    }
  }

  function renderPlaylist() {
    const container = document.getElementById('playlistContainer');
    if (!currentPlaylist.length) { container.innerHTML = '<div style="text-align:center;">No playlist loaded</div>'; return; }
    container.innerHTML = currentPlaylist.slice(0,12).map(item => `<div class="link-item" data-url="${escapeHtml(item.url)}"><span><i class="fas fa-play-circle"></i> ${escapeHtml(item.name)}</span><button class="save-fav-btn" data-url="${escapeHtml(item.url)}" data-name="${escapeHtml(item.name)}">⭐</button></div>`).join('');
    container.querySelectorAll('.link-item').forEach(el => {
      el.addEventListener('click', (e) => { if (!e.target.classList.contains('save-fav-btn')) playWithRecovery(el.dataset.url); });
      el.querySelector('.save-fav-btn')?.addEventListener('click', (e) => { e.stopPropagation(); let url=el.dataset.url, name=el.querySelector('span')?.innerText||'video'; if(!favorites.some(f=>f.url===url)){ favorites.push({name,url}); localStorage.setItem('ajnFavorites',JSON.stringify(favorites)); renderFavorites(); alert('Saved to favorites'); } });
    });
  }

  function renderFavorites() {
    const container = document.getElementById('favoritesList');
    if (!favorites.length) { container.innerHTML = '<div class="error-placeholder" style="padding:12px;">No favorites yet</div>'; return; }
    container.innerHTML = favorites.slice(0,12).map(fav => `<div class="tile-block special" data-url="${escapeHtml(fav.url)}"><span><i class="fas fa-star"></i> ${escapeHtml(fav.name)}</span><button class="remove-fav" style="background:#ef4444; border:none; border-radius:20px; padding:2px 10px;">✖</button></div>`).join('');
    container.querySelectorAll('.tile-block').forEach(el => {
      el.addEventListener('click', (e) => { if (!e.target.classList.contains('remove-fav')) playWithRecovery(el.dataset.url); });
      el.querySelector('.remove-fav')?.addEventListener('click', (e) => { e.stopPropagation(); favorites = favorites.filter(f=>f.url !== el.dataset.url); localStorage.setItem('ajnFavorites', JSON.stringify(favorites)); renderFavorites(); });
    });
  }

  // URL handler
  const urlInput = document.getElementById('urlInput');
  async function handleUrlInput() {
    let rawUrl = urlInput.value.trim();
    if (!rawUrl) return;
    if (rawUrl.endsWith('.m3u') || rawUrl.endsWith('.m3u8')) {
      try { let resp = await fetch(rawUrl); parseM3U(await resp.text()); } catch(e) { alert('Invalid M3U'); console.warn(e); }
    } else if (rawUrl.match(/\.(mp4|m4v|m3u8)/i)) playWithRecovery(rawUrl);
    else { alert('Enter a valid stream URL or M3U playlist'); }
  }

  // Event listeners
  document.getElementById('stopBtn').addEventListener('click', () => { fullCleanup(); video.pause(); video.removeAttribute('src'); video.load(); });
  document.getElementById('playPauseBtn').addEventListener('click', () => video.paused ? video.play() : video.pause());
  document.getElementById('muteBtn').addEventListener('click', () => { video.muted = !video.muted; });
  document.getElementById('loadUrlBtn').addEventListener('click', handleUrlInput);
  document.getElementById('savePlaylistBtn').addEventListener('click', () => { if(currentPlaylist.length){ localStorage.setItem('ajnCurrentPlaylist', JSON.stringify(currentPlaylist)); alert('Playlist saved'); } });
  document.getElementById('exportFavBtn').addEventListener('click', () => { let m3u = "#EXTM3U\n" + favorites.map(f => `#EXTINF:-1,${f.name}\n${f.url}`).join('\n'); let blob=new Blob([m3u],{type:'audio/x-mpegurl'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='favorites.m3u'; a.click(); });
  
  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.background = 'rgba(59,130,246,0.2)'; });
  dropZone.addEventListener('dragleave', () => dropZone.style.background = '');
  dropZone.addEventListener('drop', async e => { e.preventDefault(); dropZone.style.background = ''; const file = e.dataTransfer.files[0]; if(file && (file.name.endsWith('.m3u')||file.name.endsWith('.txt'))) parseM3U(await file.text()); else alert('Drop .m3u file'); });
  dropZone.addEventListener('click', () => { let inp = document.createElement('input'); inp.type='file'; inp.accept='.m3u,.txt'; inp.onchange= async ev => { if(ev.target.files.length) parseM3U(await ev.target.files[0].text()); }; inp.click(); });
  
  document.querySelectorAll('.tab').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active')); document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active')); btn.classList.add('active'); document.getElementById(btn.dataset.tab).classList.add('active'); }); });
  
  // THEME PERSISTENCE (matching other button styles)
  const themeToggle = document.getElementById('themeToggle');
  const savedTheme = localStorage.getItem('ajn_theme');
  if (savedTheme === 'light') document.body.classList.add('light');
  themeToggle.addEventListener('click', () => {
    document.body.classList.toggle('light');
    const isLight = document.body.classList.contains('light');
    localStorage.setItem('ajn_theme', isLight ? 'light' : 'dark');
    const icon = themeToggle.querySelector('i');
    if (icon) icon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
  });
  // initial icon
  const isLightInit = document.body.classList.contains('light');
  themeToggle.querySelector('i').className = isLightInit ? 'fas fa-sun' : 'fas fa-moon';
  
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
  renderFavorites();
  if (!currentPlaylist.length) { currentPlaylist = [{ name: "Demo HLS", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" }]; renderPlaylist(); }
  loadCarouselNews();
  fetchAJNArchiveTiles();
</script>
</body>
</html>
