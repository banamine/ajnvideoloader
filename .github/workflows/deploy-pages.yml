name: Deploy to GitHub Pages (4x Daily)

on:
  push:
    branches:
      - main
  schedule:
    # Run 4 times a day: 12 AM, 6 AM, 12 PM, 6 PM UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          # For static deployment, use a public CORS proxy
          VITE_CORS_PROXY: 'https://api.allorigins.win/raw?url='

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/client'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Log deployment status
        run: |
          echo "✅ Deployment complete at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "📝 Next check in 6 hours"
